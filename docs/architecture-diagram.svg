<svg width="1330" height="1100" viewBox="0 0 1330 1100" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI,Arial,sans-serif">
  <style>
    .core { fill: #e0f7fa; stroke: #0097a7; stroke-width: 2; }
    .platform { fill: #e1bee7; stroke: #7b1fa2; stroke-width: 2; }
    .optional { fill: #ffe082; stroke: #fbc02d; stroke-width: 2; }
    .title { font-size: 30px; font-weight: bold; fill: #333; }
    .label { font-size: 18px; font-weight: bold; fill: #222; }
    .small { font-size: 14px; }
    .arrow { stroke: #666; stroke-width: 2; marker-end: url(#arrowhead);}
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7"
      refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666" />
    </marker>
  </defs>
  <!-- Title -->
  <text x="50%" y="48" text-anchor="middle" class="title">OpenT3Base Architecture Overview</text>
  <!-- Core modules -->
  <rect x="90" y="130" width="180" height="55" rx="16" class="core"/>
  <text x="180" y="163" text-anchor="middle" class="label">PLM</text>
  <text x="180" y="183" text-anchor="middle" class="small">Product Lifecycle Mgt</text>

  <rect x="90" y="220" width="180" height="55" rx="16" class="core"/>
  <text x="180" y="253" text-anchor="middle" class="label">MRP</text>
  <text x="180" y="273" text-anchor="middle" class="small">Material Requirements</text>

  <rect x="90" y="310" width="180" height="55" rx="16" class="core"/>
  <text x="180" y="343" text-anchor="middle" class="label">SCM</text>
  <text x="180" y="363" text-anchor="middle" class="small">Supply Chain Mgt</text>

  <rect x="400" y="175" width="180" height="55" rx="16" class="core"/>
  <text x="490" y="208" text-anchor="middle" class="label">MES</text>
  <text x="490" y="228" text-anchor="middle" class="small">Manufacturing Exec</text>

  <rect x="400" y="270" width="180" height="55" rx="16" class="core"/>
  <text x="490" y="303" text-anchor="middle" class="label">ERP</text>
  <text x="490" y="323" text-anchor="middle" class="small">Enterprise Resource</text>

  <rect x="720" y="120" width="180" height="55" rx="16" class="core"/>
  <text x="810" y="153" text-anchor="middle" class="label">SALES</text>
  <text x="810" y="173" text-anchor="middle" class="small">Sales & Commerce</text>

  <rect x="720" y="200" width="180" height="55" rx="16" class="core"/>
  <text x="810" y="233" text-anchor="middle" class="label">LOGISTICS</text>
  <text x="810" y="253" text-anchor="middle" class="small">Logistics & Fulfillment</text>

  <rect x="720" y="290" width="180" height="55" rx="16" class="core"/>
  <text x="810" y="323" text-anchor="middle" class="label">CRM</text>
  <text x="810" y="343" text-anchor="middle" class="small">Customer Rel. Mgt</text>

  <rect x="1040" y="200" width="180" height="55" rx="16" class="core"/>
  <text x="1130" y="233" text-anchor="middle" class="label">BI</text>
  <text x="1130" y="253" text-anchor="middle" class="small">Business Intelligence</text>

  <rect x="1040" y="120" width="180" height="55" rx="16" class="core"/>
  <text x="1130" y="153" text-anchor="middle" class="label">QMS</text>
  <text x="1130" y="173" text-anchor="middle" class="small">Quality Mgt Sys</text>

  <!-- Platform modules -->
  <rect x="400" y="385" width="180" height="55" rx="16" class="platform"/>
  <text x="490" y="418" text-anchor="middle" class="label">IAM</text>
  <text x="490" y="438" text-anchor="middle" class="small">Identity & Access</text>

  <rect x="760" y="385" width="180" height="55" rx="16" class="platform"/>
  <text x="850" y="418" text-anchor="middle" class="label">PM</text>
  <text x="850" y="438" text-anchor="middle" class="small">Project Management</text>

  <rect x="90" y="400" width="180" height="55" rx="16" class="platform"/>
  <text x="180" y="433" text-anchor="middle" class="label">DMS</text>
  <text x="180" y="453" text-anchor="middle" class="small">Doc Mgt Sys</text>

  <rect x="1040" y="320" width="180" height="55" rx="16" class="platform"/>
  <text x="1130" y="353" text-anchor="middle" class="label">MOBILE/IoT</text>
  <text x="1130" y="373" text-anchor="middle" class="small">Mobile & IoT Support</text>

  <rect x="90" y="490" width="180" height="55" rx="16" class="platform"/>
  <text x="180" y="523" text-anchor="middle" class="label">I18N</text>
  <text x="180" y="543" text-anchor="middle" class="small">Localization & Intl</text>

  <rect x="400" y="485" width="180" height="55" rx="16" class="platform"/>
  <text x="490" y="518" text-anchor="middle" class="label">COMMUNITY</text>
  <text x="490" y="538" text-anchor="middle" class="small">Community & Ecosystem</text>

  <!-- Optional modules -->
  <rect x="760" y="485" width="180" height="55" rx="16" class="optional"/>
  <text x="850" y="518" text-anchor="middle" class="label">AI/ML</text>
  <text x="850" y="538" text-anchor="middle" class="small">AI & Machine Learning</text>

  <rect x="1040" y="450" width="180" height="55" rx="16" class="optional"/>
  <text x="1130" y="483" text-anchor="middle" class="label">COMPLIANCE</text>
  <text x="1130" y="503" text-anchor="middle" class="small">Compliance & Audit</text>

  <rect x="90" y="580" width="180" height="55" rx="16" class="optional"/>
  <text x="180" y="613" text-anchor="middle" class="label">MARKETPLACE</text>
  <text x="180" y="633" text-anchor="middle" class="small">Marketplace/Plugins</text>

  <rect x="400" y="590" width="180" height="55" rx="16" class="optional"/>
  <text x="490" y="623" text-anchor="middle" class="label">INTHUB</text>
  <text x="490" y="643" text-anchor="middle" class="small">Integration Hub/API</text>

  <rect x="1040" y="580" width="180" height="55" rx="16" class="optional"/>
  <text x="1130" y="613" text-anchor="middle" class="label">INDUSTRY</text>
  <text x="1130" y="633" text-anchor="middle" class="small">Industry Modules</text>

  <!-- Arrows - Core flow -->
  <line x1="180" y1="185" x2="180" y2="220" class="arrow"/>
  <line x1="180" y1="275" x2="180" y2="310" class="arrow"/>
  <line x1="180" y1="340" x2="400" y2="202" class="arrow"/>
  <line x1="180" y1="365" x2="400" y2="300" class="arrow"/>
  <line x1="180" y1="365" x2="400" y2="200" class="arrow"/>
  <line x1="490" y1="230" x2="490" y2="270" class="arrow"/>
  <line x1="180" y1="255" x2="400" y2="205" class="arrow"/>
  <line x1="490" y1="325" x2="490" y2="385" class="arrow"/>
  <line x1="810" y1="175" x2="810" y2="200" class="arrow"/>
  <line x1="810" y1="255" x2="810" y2="290" class="arrow"/>
  <line x1="810" y1="343" x2="1130" y2="200" class="arrow"/>
  <line x1="1130" y1="255" x2="1130" y2="320" class="arrow"/>
  <line x1="490" y1="303" x2="810" y2="293" class="arrow"/>
  <line x1="490" y1="303" x2="810" y2="153" class="arrow"/>
  <line x1="490" y1="303" x2="1130" y2="153" class="arrow"/>
  <line x1="490" y1="303" x2="1130" y2="233" class="arrow"/>
  <line x1="1130" y1="373" x2="1130" y2="450" class="arrow"/>
  <line x1="810" y1="153" x2="1130" y2="153" class="arrow"/>
  <line x1="490" y1="208" x2="810" y2="153" class="arrow"/>
  <line x1="490" y1="208" x2="810" y2="233" class="arrow"/>
  <line x1="490" y1="208" x2="1130" y2="153" class="arrow"/>
  <line x1="490" y1="303" x2="1130" y2="153" class="arrow"/>
  <line x1="1130" y1="153" x2="1130" y2="233" class="arrow"/>
  <line x1="490" y1="303" x2="810" y2="233" class="arrow"/>
  <line x1="490" y1="303" x2="1130" y2="233" class="arrow"/>
  <line x1="490" y1="303" x2="1130" y2="373" class="arrow"/>
  <line x1="810" y1="175" x2="1130" y2="373" class="arrow"/>

  <!-- Platform cross-module lines -->
  <rect x="630" y="750" width="500" height="60" rx="16" class="platform" opacity="0.3"/>
  <text x="880" y="785" text-anchor="middle" class="label" opacity="0.5">All Platform Modules Serve All Core/Optional Modules</text>

  <!-- Legend -->
  <rect x="70" y="720" width="340" height="120" rx="18" fill="#fff" stroke="#bbb" stroke-width="2"/>
  <rect x="90" y="740" width="32" height="32" rx="8" class="core"/>
  <text x="130" y="760" class="label" font-size="16">Core Business Module</text>
  <rect x="90" y="780" width="32" height="32" rx="8" class="platform"/>
  <text x="130" y="800" class="label" font-size="16">Platform/Cross-cutting Module</text>
  <rect x="90" y="820" width="32" height="32" rx="8" class="optional"/>
  <text x="130" y="840" class="label" font-size="16">Optional/Advanced Module</text>
</svg>